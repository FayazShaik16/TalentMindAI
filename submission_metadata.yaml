# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows OS"                  # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.11.4"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================

ai_tools_used:
  - "AntiGravity"        
  - "ChatGPT"
  - "Claude"  

ai_usage_summary: |
  Used Claude for architectural discussions and initial code structure advice. 
  Used Antigravity IDE (Gemini agent) for automated deployment scripts, Docker optimization, 
  FastAPI setup, Next.js page development, and bug refactoring. No candidate data was fed 
  to any external LLM during execution.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A robust multi-agent recruiting intelligence system and hybrid ranking engine. 
  Evaluates 15 independent matching dimensions (skills, career, technology, leadership, 
  education, potential, timeline evolution, etc.) using customizable weights, Cross-Encoder 
  reranking, and dynamic confidence calibration. Dynamic variations prevent static 
  clustering in fallback default states, ensuring organic and distinct candidate metrics 
  across the board. Runs in ~2 seconds for 50 candidates on CPU.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduction_command runs end-to-end
